<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power SMS | Login</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/login.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <!-- ===== LOGIN PAGE ===== -->
    <div id="login-page">
        <div class="login-box">
            
            <!-- Error Message -->
            <div class="login-err" id="loginError">Invalid email or password!</div>
            
            <!-- Email -->
            <div class="lf-wrap">
                <i class="fa fa-envelope lf-icon"></i>
                <input class="lf-input" type="email" id="loginEmail" placeholder="Email address" autocomplete="off">
            </div>
            
            <!-- Password -->
            <div class="lf-wrap">
                <i class="fa fa-lock lf-icon"></i>
                <input class="lf-input" type="password" id="loginPassword" placeholder="Password">
            </div>
            
            <!-- Captcha -->
            <div class="captcha-line">
                <span id="captchaQuestion">What is 0 + 1 = ?</span>
                <input type="text" id="captchaInput" placeholder="Answer">
            </div>
            
            <!-- Login Button -->
            <button class="btn-login" id="loginBtn">LOGIN</button>
            
            <!-- Setup Link (Only shows first time) -->
            <div style="text-align: center; margin-top: 14px; font-size: 12px;">
                <a href="#" id="setupLink" style="color: #6CF; display: none;">Create Super Admin Account</a>
            </div>
            
        </div>
    </div>

    <!-- ===== JAVASCRIPT ===== -->
    <script src="js/firebase-auth-setup.js"></script>
    <script src="js/auth.js"></script>
    
</body>
</html>
