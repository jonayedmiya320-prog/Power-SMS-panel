<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Power SMS | My Clients</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        /* ===== SAME AS DASHBOARD ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            font-size: 13px;
            background: #eee;
            color: #333;
        }
        a {
            text-decoration: none;
            color: #0068a3;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 46px;
            background: #0068a3;
            background: linear-gradient(to bottom, #0068a3, #004e7a);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
        }
        .tb-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tb-brand {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tb-brand i {
            font-size: 18px;
        }
        .hamburger {
            background: none;
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            line-height: 1;
        }
        .tb-right {
            position: relative;
        }
        .tb-user {
            color: #6CF;
            font-size: 12px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tb-dot {
            width: 8px;
            height: 8px;
            background: #e74c3c;
            border-radius: 50%;
        }
        .tb-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 46px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            min-width: 175px;
            padding: 4px 0;
            z-index: 2000;
            list-style: none;
            box-shadow: 0 4px 14px rgba(0, 0, 0, .15);
        }
        .tb-dropdown.open {
            display: block;
        }
        .tb-dropdown li a {
            display: block;
            padding: 8px 14px;
            color: #333;
            font-size: 12px;
        }
        .tb-dropdown li a:hover {
            background: #f0f8ff;
        }
        .tb-dropdown .sep {
            border-top: 1px solid #eee;
            margin: 3px 0;
        }

        /* ===== SIDEBAR ===== */
        #sb-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .4);
            z-index: 899;
        }
        #sb-overlay.on {
            display: block;
        }
        @media(min-width:900px) {
            #sb-overlay {
                display: none !important;
            }
        }

        #sidebar {
            position: fixed;
            top: 46px;
            left: -204px;
            width: 200px;
            height: calc(100vh - 46px);
            background: #e8e8e8;
            border-right: #004165 1px solid;
            overflow-y: auto;
            z-index: 900;
            transition: left .22s;
            padding-bottom: 30px;
        }
        #sidebar.open {
            left: 0;
        }
        @media(min-width:900px) {
            #sidebar {
                left: 0;
            }
        }
        #sidebar::-webkit-scrollbar {
            width: 3px;
        }
        #sidebar::-webkit-scrollbar-thumb {
            background: #bbb;
        }

        .sb-info {
            padding: 10px 14px;
            background: #d8d8d8;
            color: #444;
            font-size: 11.5px;
            line-height: 1.85;
            border-bottom: 1px solid #c0c0c0;
        }
        .sb-info b {
            color: #0068a3;
        }

        .side-nav {
            list-style: none;
        }
        .side-nav>li>a {
            display: block;
            padding: 9px 14px;
            color: #eee;
            font-size: 12px;
            border-bottom: #002e48 1px solid;
            background: #0068a3;
            background: linear-gradient(to bottom, #0068a3, #004e7a);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.2) inset;
            cursor: pointer;
        }
        .side-nav>li>a:hover {
            background: #f8f8f8;
            color: #333;
        }
        .side-nav>li>a i {
            margin-right: 7px;
            width: 14px;
            text-align: center;
        }

        /* ===== CONTENT ===== */
        #main-content {
            margin-top: 46px;
            padding: 13px 12px;
            min-height: calc(100vh - 46px);
            background: #eee;
        }
        @media(min-width:900px) {
            #main-content {
                margin-left: 200px;
                padding: 15px 20px;
            }
        }

        /* ===== BREADCRUMB ===== */
        .bc {
            background: linear-gradient(to bottom, #f1f1f1, #dbdbdb);
            border: 1px solid #c8c8c8;
            border-radius: 3px;
            padding: 7px 13px;
            margin-bottom: 13px;
            font-size: 12px;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 3px;
            flex-wrap: wrap;
        }
        .bc li {
            display: inline;
        }
        .bc .div {
            color: #aaa;
            padding: 0 3px;
        }
        .bc a {
            color: #0068a3;
            cursor: pointer;
        }

        /* ===== WIDGET ===== */
        .wblock {
            background: #eee;
            border: 1px solid #ccc;
            border-radius: 3px;
            margin-bottom: 13px;
        }
        .whead {
            padding: 9px 13px;
            background: linear-gradient(to bottom, #f1f1f1, #dbdbdb);
            border-bottom: 1px solid #c8c8c8;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .whead h5 {
            margin: 0;
            font-size: 13px;
            font-weight: bold;
            color: #444;
        }
        .wbody {
            overflow-x: auto;
            background: #eee;
        }
        .wpad {
            padding: 13px;
        }

        /* ===== TABLES ===== */
        table.tbl {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        table.tbl th {
            background: linear-gradient(to bottom, #eeeeee, #cccccc);
            padding: 8px 10px;
            text-align: left;
            border: none;
            border-bottom: 1px solid #b8b8b8;
            font-weight: bold;
            color: #444;
            white-space: nowrap;
        }
        table.tbl td {
            padding: 7px 10px;
            border: none;
            border-bottom: 1px solid #ddd;
            color: #444;
            vertical-align: middle;
            background: #fff;
        }
        .tbl-str tbody tr:nth-child(odd) td {
            background: #f8f8f8;
        }

        /* ===== LABELS ===== */
        .lbl {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
        }
        .lbl-info {
            background: #5bc0de;
            color: #fff;
        }
        .lbl-success {
            background: #5cb85c;
            color: #fff;
        }
        .lbl-default {
            background: #999;
            color: #fff;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            font-family: inherit;
            line-height: 1.5;
            text-align: center;
        }
        .btn-pr {
            background: linear-gradient(to bottom, #0068a3, #004e7a);
            color: #fff;
            border-color: #003d5e;
        }
        .btn-pr:hover {
            background: linear-gradient(to bottom, #005a8c, #003c64);
        }
        .btn-dn {
            background: #d9534f;
            color: #fff;
            border-color: #c9302c;
        }
        .btn-dn:hover {
            background: #c9302c;
        }
        .btn-wn {
            background: #f0ad4e;
            color: #fff;
            border-color: #eea236;
        }
        .btn-xs {
            padding: 2px 6px;
            font-size: 11px;
        }
        .btn-sm {
            padding: 3px 8px;
            font-size: 11px;
        }

        /* ===== MODAL ===== */
        .modal-ov {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .52);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-ov.on {
            display: flex;
        }
        .modal-bx {
            background: #fff;
            border-radius: 4px;
            width: 500px;
            max-width: 96vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 6px 32px rgba(0, 0, 0, .32);
        }
        .mhd {
            background: linear-gradient(to bottom, #f1f1f1, #dbdbdb);
            border-bottom: 1px solid #c8c8c8;
            padding: 11px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .mhd h4 {
            margin: 0;
            font-size: 14px;
            color: #333;
        }
        .mhd .cls {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #aaa;
            line-height: 1;
        }
        .mbd {
            padding: 15px;
            background: #fff;
        }
        .mft {
            padding: 11px 15px;
            border-top: 1px solid #eee;
            text-align: right;
            background: #f9f9f9;
        }

        /* ===== FORM ===== */
        .fc {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 12px;
            font-family: inherit;
            outline: none;
            background: #fff;
        }
        .fc:focus {
            border-color: #0068a3;
        }
        .clbl {
            font-weight: bold;
            font-size: 12px;
            color: #555;
            display: block;
            margin-bottom: 4px;
        }
        .ctrl {
            margin-bottom: 11px;
        }

        /* ===== PAGER ===== */
        .pager-row {
            background: linear-gradient(to bottom, #f1f1f1, #dbdbdb);
            border-bottom: 1px solid #c8c8c8;
            padding: 6px 10px;
            text-align: right;
        }
        .pgr {
            background: linear-gradient(to bottom, #fafafa, #e0e0e0);
            border: 1px solid #ccc;
            color: #555;
            padding: 4px 11px;
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 2px;
        }
        .pgr:hover {
            background: linear-gradient(to bottom, #e8e8e8, #c8c8c8);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .dash-grid-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <!-- ===== TOPBAR ===== -->
    <div class="topbar">
        <div class="tb-left">
            <button class="hamburger" onclick="toggleSB()">&#9776;</button>
            <div class="tb-brand">
                <i class="fa fa-sms"></i> Power SMS
            </div>
        </div>
        <div class="tb-right">
            <div class="tb-user" onclick="toggleDrop(event)">
                <span class="tb-dot"></span>
                <span id="tbU">User</span> &#9662;
            </div>
            <ul class="tb-dropdown" id="tbDrop">
                <li><a href="#" onclick="logoutUser()" style="color:#c0392b;font-weight:bold;"><i class="fa fa-power-off"></i> Logout</a></li>
            </ul>
        </div>
    </div>

    <!-- ===== SIDEBAR OVERLAY ===== -->
    <div id="sb-overlay" onclick="closeSB()"></div>

    <!-- ===== SIDEBAR ===== -->
    <div id="sidebar">
        <div class="sb-info">
            Welcome <b id="sbU">User</b><br />
            <b>Agent Panel</b>
        </div>
        <ul class="side-nav">
            <li><a href="dashboard.html"><i class="fa fa-desktop"></i> Dashboard</a></li>
            <li><a href="clients.html" class="on"><i class="fa fa-user"></i> My Clients</a></li>
            <li><a href="#"><i class="fa fa-envelope"></i> SMS Ranges</a></li>
            <li><a href="#"><i class="fa fa-bar-chart"></i> Reports</a></li>
            <li><a href="#"><i class="fa fa-money"></i> Payments</a></li>
        </ul>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div id="main-content">

        <!-- Breadcrumb -->
        <ul class="bc">
            <li><a href="dashboard.html">Home</a></li>
            <li class="div">»</li>
            <li>My Clients</li>
        </ul>

        <!-- Clients Widget -->
        <div class="wblock">
            <div class="whead">
                <h5><i class="fa fa-user"></i> My Clients</h5>
                <button class="btn btn-pr btn-xs" onclick="openModal('addCM')">+ Add New Client</button>
            </div>
            <div class="wbody">
                <div class="pager-row">
                    <button class="pgr">First</button>
                    <button class="pgr">Previous</button>
                    <button class="pgr">Next</button>
                    <button class="pgr">Last</button>
                </div>
                <table class="tbl tbl-str">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Skype</th>
                            <th>Contact</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="clientTable">
                        <tr><td colspan="6" style="text-align:center;color:#aaa;padding:18px;">Loading clients...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- ===== ADD CLIENT MODAL ===== -->
    <div class="modal-ov" id="addCM">
        <div class="modal-bx">
            <div class="mhd">
                <h4>Add New Client</h4>
                <button class="cls" onclick="closeModal('addCM')">&times;</button>
            </div>
            <div class="mbd">
                <div class="ctrl">
                    <label class="clbl">Username *</label>
                    <input class="fc" id="nCU" placeholder="Username" />
                </div>
                <div class="ctrl">
                    <label class="clbl">Password</label>
                    <input class="fc" type="password" id="nCP" placeholder="Password" />
                </div>
                <div class="ctrl">
                    <label class="clbl">Email</label>
                    <input class="fc" id="nCE" placeholder="Email" />
                </div>
                <div class="ctrl">
                    <label class="clbl">Skype ID</label>
                    <input class="fc" id="nCS" placeholder="Skype ID" />
                </div>
                <div class="ctrl">
                    <label class="clbl">Contact No.</label>
                    <input class="fc" id="nCC" placeholder="Contact number" />
                </div>
                <div class="ctrl">
                    <label class="clbl">Status</label>
                    <select class="fc" id="nCST">
                        <option value="1">Active</option>
                        <option value="0">Inactive</option>
                    </select>
                </div>
            </div>
            <div class="mft">
                <button class="btn btn-df" onclick="closeModal('addCM')">Close</button>
                <button class="btn btn-pr" onclick="addClient()">Add Client</button>
            </div>
        </div>
    </div>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // =============================================
        // FIREBASE CONFIG
        // =============================================
        const firebaseConfig = {
            apiKey: "AIzaSyCmG269FY90tV6pWZmmcUssxcMXiPgmCB8",
            authDomain: "power-sms-60eea.firebaseapp.com",
            projectId: "power-sms-60eea",
            storageBucket: "power-sms-60eea.firebasestorage.app",
            messagingSenderId: "757262497754",
            appId: "1:757262497754:web:8f14c7ee78604298b1f2e3"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // =============================================
        // CHECK AUTH
        // =============================================
        const userUID = localStorage.getItem('userUID');
        const userName = localStorage.getItem('userName') || 'User';

        if (!userUID) {
            window.location.href = 'login.html';
        }

        document.getElementById('tbU').textContent = userName;
        document.getElementById('sbU').textContent = userName;

        // =============================================
        // LOGOUT
        // =============================================
        async function logoutUser() {
            try {
                await auth.signOut();
                localStorage.clear();
                window.location.href = 'login.html';
            } catch (err) {
                alert('Logout failed!');
            }
        }

        // =============================================
        // SIDEBAR
        // =============================================
        function toggleSB() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sb-overlay').classList.toggle('on');
        }
        function closeSB() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sb-overlay').classList.remove('on');
        }

        // =============================================
        // DROPDOWN
        // =============================================
        function toggleDrop(e) {
            e.stopPropagation();
            document.getElementById('tbDrop').classList.toggle('open');
        }
        document.addEventListener('click', function() {
            document.getElementById('tbDrop').classList.remove('open');
        });

        // =============================================
        // MODAL
        // =============================================
        function openModal(id) {
            document.getElementById(id).classList.add('on');
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('on');
        }
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal-ov')) {
                e.target.classList.remove('on');
            }
        });

        // =============================================
        // CLIENTS CRUD
        // =============================================

        // Load clients
        async function loadClients() {
            const tbody = document.getElementById('clientTable');
            try {
                const snapshot = await db.collection('clients').orderBy('createdAt', 'desc').get();
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:18px;">No clients yet.</td></tr>';
                    return;
                }
                let html = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const statusClass = data.status === 'Active' ? 'lbl-info' : 'lbl-default';
                    html += `<tr>
                        <td>${data.username || '—'}</td>
                        <td>${data.email || '—'}</td>
                        <td>${data.skype || '—'}</td>
                        <td>${data.contact || '—'}</td>
                        <td><span class="lbl ${statusClass}">${data.status || 'Inactive'}</span></td>
                        <td>
                            <div class="btngrp">
                                <button class="btn btn-pr btn-xs" onclick="editClient('${doc.id}')"><i class="fa fa-edit"></i></button>
                                <button class="btn btn-dn btn-xs" onclick="deleteClient('${doc.id}')"><i class="fa fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            } catch (err) {
                console.error('Error loading clients:', err);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#e74c3c;padding:18px;">Error loading clients.</td></tr>';
            }
        }

        // Add client
        async function addClient() {
            const username = document.getElementById('nCU').value.trim();
            const password = document.getElementById('nCP').value;
            const email = document.getElementById('nCE').value.trim();
            const skype = document.getElementById('nCS').value.trim();
            const contact = document.getElementById('nCC').value.trim();
            const status = document.getElementById('nCST').value === '1' ? 'Active' : 'Inactive';

            if (username.length < 3) {
                alert('Username must be at least 3 characters.');
                return;
            }

            try {
                // Optional: create Firebase Auth user for client
                // For simplicity, we just store in Firestore
                await db.collection('clients').add({
                    username,
                    email,
                    skype,
                    contact,
                    status,
                    createdBy: userUID,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                closeModal('addCM');
                // Clear fields
                ['nCU', 'nCP', 'nCE', 'nCS', 'nCC'].forEach(id => document.getElementById(id).value = '');
                loadClients();
            } catch (err) {
                console.error('Error adding client:', err);
                alert('Failed to add client: ' + err.message);
            }
        }

        // Delete client
        async function deleteClient(id) {
            if (!confirm('Are you sure you want to delete this client?')) return;
            try {
                await db.collection('clients').doc(id).delete();
                loadClients();
            } catch (err) {
                console.error('Error deleting client:', err);
                alert('Failed to delete client.');
            }
        }

        // Edit client (placeholder - you can implement edit modal later)
        function editClient(id) {
            alert('Edit functionality coming soon!');
            // You can implement a modal with pre-filled data
        }

        // =============================================
        // INIT
        // =============================================
        loadClients();
    </script>

</body>
</html>
