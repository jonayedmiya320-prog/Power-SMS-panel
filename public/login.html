<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Power SMS | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="login-page">
  <div class="login-box">
    <div class="login-title">🔐 Power SMS</div>
    <div class="login-err" id="err"></div>
    <div class="lf-wrap">
      <i class="fa fa-user lf-icon"></i>
      <input class="lf-input" type="text" id="username" placeholder="Username" autocomplete="off">
    </div>
    <div class="lf-wrap">
      <i class="fa fa-lock lf-icon"></i>
      <input class="lf-input" type="password" id="pass" placeholder="Password">
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">LOGIN</button>
  </div>
</div>

<script>
// Already logged in check
if (localStorage.getItem('ps_token')) {
  window.location.href = '/dashboard';
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const pass = document.getElementById('pass').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('loginBtn');

  err.style.display = 'none';

  if (!username || !pass) { showErr('Username and password required.'); return; }

  btn.textContent = 'Logging in...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password: pass })
    });
    const data = await res.json();
    if (data.token) {
      localStorage.setItem('ps_token', data.token);
      localStorage.setItem('ps_username', data.username);
      window.location.href = '/dashboard';
    } else {
      showErr(data.error || 'Invalid credentials.');
      btn.textContent = 'LOGIN';
      btn.disabled = false;
    }
  } catch (e) {
    showErr('Server error. Try again.');
    btn.textContent = 'LOGIN';
    btn.disabled = false;
  }
}

function showErr(msg) {
  const err = document.getElementById('err');
  err.textContent = msg;
  err.style.display = 'block';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
