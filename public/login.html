<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Power SMS | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="login-page">
  <div class="login-box">
    <div class="login-title">🔐 Power SMS</div>
    <div class="login-err" id="err"></div>
    <div class="lf-wrap">
      <i class="fa fa-envelope lf-icon"></i>
      <input class="lf-input" type="email" id="email" placeholder="Email" autocomplete="off">
    </div>
    <div class="lf-wrap">
      <i class="fa fa-lock lf-icon"></i>
      <input class="lf-input" type="password" id="pass" placeholder="Password">
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">LOGIN</button>
  </div>
</div>

<script type="module">
import { auth } from '/js/firebase-config.js';
import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
  if (user) window.location.href = '/dashboard';
});

window.doLogin = async function() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('loginBtn');

  err.style.display = 'none';

  if (!email || !pass) { showErr('Email and password required.'); return; }

  btn.textContent = 'Logging in...';
  btn.disabled = true;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    window.location.href = '/dashboard';
  } catch (e) {
    showErr('Invalid email or password.');
    btn.textContent = 'LOGIN';
    btn.disabled = false;
  }

  function showErr(msg) {
    err.textContent = msg;
    err.style.display = 'block';
  }
};

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
