<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Power SMS | Login</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            font-size: 13px;
            background: #eee;
            color: #333;
        }
        a {
            text-decoration: none;
            color: #0068a3;
        }

        /* ===== LOGIN PAGE ===== */
        #login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(170deg, #8faab8 0%, #607d8b 45%, #455a64 100%);
        }
        .login-box {
            background: #0d1f3c;
            border-radius: 18px;
            padding: 38px 28px 34px;
            width: 340px;
            max-width: 94vw;
            box-shadow: 0 10px 40px rgba(0, 0, 0, .5);
        }
        .login-err {
            background: rgba(220, 50, 50, .18);
            border: 1px solid rgba(220, 80, 80, .35);
            color: #ff8080;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 14px;
            display: none;
        }
        .lf-wrap {
            position: relative;
            margin-bottom: 14px;
        }
        .lf-wrap .lf-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 14px;
        }
        .lf-input {
            width: 100%;
            background: #e6e6e6;
            border: none;
            border-radius: 28px;
            padding: 13px 16px 13px 42px;
            font-size: 14px;
            color: #555;
            outline: none;
            display: block;
        }
        .lf-input:focus {
            background: #ddd;
        }
        .captcha-line {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .captcha-line input {
            background: #fff;
            border: 1px solid #bbb;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 13px;
            width: 90px;
            outline: none;
            color: #333;
        }
        .btn-login {
            width: 100%;
            background: #4caf50;
            color: #fff;
            border: none;
            border-radius: 28px;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1.5px;
            cursor: pointer;
        }
        .btn-login:hover {
            background: #43a047;
        }
        .setup-link {
            text-align: center;
            margin-top: 14px;
            font-size: 12px;
        }
        .setup-link a {
            color: #6CF;
            text-decoration: none;
        }
        .setup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-box">
            <div class="login-err" id="loginError">Invalid username or password!</div>

            <div class="lf-wrap">
                <i class="fa fa-user lf-icon"></i>
                <input class="lf-input" type="text" id="loginUsername" placeholder="Username" />
            </div>

            <div class="lf-wrap">
                <i class="fa fa-lock lf-icon"></i>
                <input class="lf-input" type="password" id="loginPassword" placeholder="Password" />
            </div>

            <div class="captcha-line">
                <span id="captchaQuestion">What is 0 + 1 = ?</span>
                <input type="text" id="captchaInput" placeholder="Answer" />
            </div>

            <button class="btn-login" id="loginBtn">LOGIN</button>

            <div class="setup-link">
                <a href="#" id="setupLink" style="display: none;">Create Super Admin Account</a>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmG269FY90tV6pWZmmcUssxcMXiPgmCB8",
            authDomain: "power-sms-60eea.firebaseapp.com",
            projectId: "power-sms-60eea",
            storageBucket: "power-sms-60eea.firebasestorage.app",
            messagingSenderId: "757262497754",
            appId: "1:757262497754:web:8f14c7ee78604298b1f2e3"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let num1 = 0,
            num2 = 1;

        function generateCaptcha() {
            num1 = Math.floor(Math.random() * 9);
            num2 = Math.floor(Math.random() * 9);
            document.getElementById('captchaQuestion').textContent =
                'What is ' + num1 + ' + ' + num2 + ' = ?';
            document.getElementById('captchaInput').value = '';
        }
        generateCaptcha();

        async function checkSetupStatus() {
            try {
                const snapshot = await db.collection('users')
                    .where('role', '==', 'SUPER_ADMIN')
                    .get();
                const link = document.getElementById('setupLink');
                if (snapshot.empty) {
                    link.style.display = 'block';
                    link.href = 'register.html';
                } else {
                    link.style.display = 'none';
                }
            } catch (err) {
                console.error('Setup check error:', err);
            }
        }
        checkSetupStatus();

        document.getElementById('loginBtn').addEventListener('click', async function() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const captchaAnswer = parseInt(document.getElementById('captchaInput').value, 10);
            const errorEl = document.getElementById('loginError');

            if (captchaAnswer !== num1 + num2) {
                errorEl.textContent = 'Invalid captcha! Please try again.';
                errorEl.style.display = 'block';
                generateCaptcha();
                return;
            }

            if (!username || !password) {
                errorEl.textContent = 'Please enter username and password.';
                errorEl.style.display = 'block';
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.textContent = 'LOGGING IN...';
            btn.disabled = true;
            errorEl.style.display = 'none';

            try {
                const email = username.toLowerCase().replace(/\s/g, '') + '@powersms.local';
                const userCred = await auth.signInWithEmailAndPassword(email, password);
                const uid = userCred.user.uid;
                const doc = await db.collection('users').doc(uid).get();

                if (!doc.exists) {
                    throw new Error('User data not found.');
                }

                const data = doc.data();
                localStorage.setItem('userUID', uid);
                localStorage.setItem('userRole', data.role);
                localStorage.setItem('userName', data.username);

                window.location.href = 'dashboard.html';

            } catch (err) {
                errorEl.textContent = err.message || 'Login failed!';
                errorEl.style.display = 'block';
                generateCaptcha();
                btn.textContent = 'LOGIN';
                btn.disabled = false;
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>

</body>
</html>
