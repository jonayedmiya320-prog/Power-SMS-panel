<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Power SMS | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.captcha-line{
  display:flex;align-items:center;gap:10px;
  color:#fff;font-size:14px;font-weight:600;margin-bottom:16px;
}
.captcha-line input{
  background:#fff;border:1px solid #bbb;border-radius:6px;
  padding:8px 10px;font-size:13px;width:90px;outline:none;color:#333;
}
</style>
</head>
<body>
<div id="login-page">
  <div class="login-box">
    <div class="login-err" id="lerr">Invalid username, password or captcha.</div>
    <div class="lf-wrap">
      <i class="fa fa-user lf-icon"></i>
      <input class="lf-input" type="text" id="lu" placeholder="Username" autocomplete="off">
    </div>
    <div class="lf-wrap">
      <i class="fa fa-lock lf-icon"></i>
      <input class="lf-input" type="password" id="lp" placeholder="Password">
    </div>
    <div class="captcha-line">
      <span id="cq">What is 0 + 1 = ?</span>
      <input type="text" id="ca" placeholder="Answer">
    </div>
    <button class="btn-login" onclick="doLogin()">LOGIN</button>
  </div>
</div>

<script>
if (localStorage.getItem('ps_token')) {
  window.location.href = '/dashboard';
}

var CA = 0, CB = 0;

function newCaptcha() {
  CA = Math.floor(Math.random() * 9);
  CB = Math.floor(Math.random() * 9);
  document.getElementById('cq').textContent = 'What is ' + CA + ' + ' + CB + ' = ?';
  document.getElementById('ca').value = '';
}
newCaptcha();

async function doLogin() {
  var u = document.getElementById('lu').value.trim();
  var p = document.getElementById('lp').value;
  var a = parseInt(document.getElementById('ca').value, 10);
  var e = document.getElementById('lerr');
  var btn = document.querySelector('.btn-login');

  e.style.display = 'none';

  if (!u || !p) { showErr('Username and password required.'); return; }
  if (a !== CA + CB) { showErr('Invalid username, password or captcha.'); newCaptcha(); return; }

  btn.textContent = 'Logging in...';
  btn.disabled = true;

  try {
    var res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    var data = await res.json();
    if (data.token) {
      localStorage.setItem('ps_token', data.token);
      localStorage.setItem('ps_username', data.username);
      window.location.href = '/dashboard';
    } else {
      showErr('Invalid username, password or captcha.');
      btn.textContent = 'LOGIN';
      btn.disabled = false;
      newCaptcha();
    }
  } catch (err) {
    showErr('Server error. Try again.');
    btn.textContent = 'LOGIN';
    btn.disabled = false;
    newCaptcha();
  }
}

function showErr(msg) {
  var e = document.getElementById('lerr');
  e.textContent = msg;
  e.style.display = 'block';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
