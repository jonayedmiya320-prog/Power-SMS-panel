<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Power SMS | Super Admin Setup</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="css/login.css" />
    <style>
        .setup-container {
            max-width: 420px;
        }
        .setup-container .sub {
            font-size: 13px;
            color: #6b7a8f;
            margin-top: -6px;
            margin-bottom: 20px;
        }
        .setup-container .note {
            background: #eef6ff;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            color: #1e2f44;
            margin-bottom: 18px;
            border-left: 4px solid #2a7de1;
        }
        .setup-container .note i {
            color: #2a7de1;
            margin-right: 8px;
        }
        .btn-register {
            background: #27ae60;
        }
        .btn-register:hover {
            background: #219a52;
        }
        .login-link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
        }
        .login-link a {
            color: #2a7de1;
            font-weight: 500;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-page">
        <div class="login-container setup-container">

            <!-- Logo -->
            <div class="logo-area">
                <i class="fas fa-user-shield logo-icon"></i>
                <h1>Super Admin Setup</h1>
                <p class="sub">Create the first administrator account</p>
            </div>

            <!-- Note -->
            <div class="note">
                <i class="fas fa-info-circle"></i>
                This account will have full control over the system.
                Only one Super Admin can exist.
            </div>

            <!-- Error Message -->
            <div class="error-msg" id="registerError"></div>

            <!-- Username -->
            <div class="input-group">
                <label>Username</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regUsername" placeholder="e.g. admin" autocomplete="off" />
                </div>
            </div>

            <!-- Email -->
            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="admin@example.com" autocomplete="email" />
                </div>
            </div>

            <!-- Password -->
            <div class="input-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="Min 6 characters" />
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="input-group">
                <label>Confirm Password</label>
                <div class="input-wrap">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="regConfirmPassword" placeholder="Re-enter password" />
                </div>
            </div>

            <!-- Register Button -->
            <button class="btn-login btn-register" id="registerBtn">
                <i class="fas fa-user-plus"></i> Create Super Admin
            </button>

            <!-- Login Link -->
            <div class="login-link">
                Already have an account? <a href="index.html">Login</a>
            </div>

        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        // ==========================================
        // Register Logic
        // ==========================================

        document.getElementById('registerBtn').addEventListener('click', async function() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const errorEl = document.getElementById('registerError');

            // Reset error
            errorEl.style.display = 'none';
            errorEl.textContent = '';

            // Validation
            if (!username || username.length < 3) {
                errorEl.textContent = '❌ Username must be at least 3 characters.';
                errorEl.style.display = 'block';
                return;
            }

            if (!email || !email.includes('@')) {
                errorEl.textContent = '❌ Please enter a valid email address.';
                errorEl.style.display = 'block';
                return;
            }

            if (!password || password.length < 6) {
                errorEl.textContent = '❌ Password must be at least 6 characters.';
                errorEl.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorEl.textContent = '❌ Passwords do not match.';
                errorEl.style.display = 'block';
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            btn.disabled = true;

            try {
                // Check if Super Admin already exists
                const snapshot = await db.collection('users')
                    .where('role', '==', 'SUPER_ADMIN')
                    .get();

                if (!snapshot.empty) {
                    errorEl.textContent = '❌ Super Admin already exists! Please login.';
                    errorEl.style.display = 'block';
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Super Admin';
                    btn.disabled = false;
                    return;
                }

                // Create user with Firebase Auth
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                const uid = userCred.user.uid;

                // Save user data in Firestore
                await db.collection('users').doc(uid).set({
                    username: username,
                    email: email,
                    role: 'SUPER_ADMIN',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    createdBy: null
                });

                // Store session
                localStorage.setItem('userUID', uid);
                localStorage.setItem('userRole', 'SUPER_ADMIN');
                localStorage.setItem('userName', username);

                // Redirect to dashboard
                window.location.href = 'dashboard.html';

            } catch (err) {
                console.error('Registration error:', err);
                errorEl.textContent = '❌ ' + (err.message || 'Registration failed. Please try again.');
                errorEl.style.display = 'block';

                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Super Admin';
                btn.disabled = false;
            }
        });

        // ===== ENTER KEY SUPPORT =====
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('registerBtn').click();
            }
        });
    </script>

</body>
</html>
