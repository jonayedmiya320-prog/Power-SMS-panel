<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex SMS | Super Admin Setup</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            font-size: 13px;
            background: #eee;
            color: #333;
        }

        #register-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(170deg, #8faab8 0%, #607d8b 45%, #455a64 100%);
        }
        .register-box {
            background: #0d1f3c;
            border-radius: 18px;
            padding: 38px 28px 34px;
            width: 380px;
            max-width: 94vw;
            box-shadow: 0 10px 40px rgba(0, 0, 0, .5);
        }
        .register-box h2 {
            color: #fff;
            text-align: center;
            font-size: 22px;
            margin-bottom: 6px;
        }
        .register-box .sub {
            color: #8ab4d6;
            text-align: center;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .register-err {
            background: rgba(220, 50, 50, .18);
            border: 1px solid rgba(220, 80, 80, .35);
            color: #ff8080;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 14px;
            display: none;
        }
        .lf-wrap {
            position: relative;
            margin-bottom: 14px;
        }
        .lf-wrap .lf-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 14px;
        }
        .lf-input {
            width: 100%;
            background: #e6e6e6;
            border: none;
            border-radius: 28px;
            padding: 13px 16px 13px 42px;
            font-size: 14px;
            color: #555;
            outline: none;
            display: block;
        }
        .lf-input:focus {
            background: #ddd;
        }
        .btn-register {
            width: 100%;
            background: #4caf50;
            color: #fff;
            border: none;
            border-radius: 28px;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1.5px;
            cursor: pointer;
        }
        .btn-register:hover {
            background: #43a047;
        }
        .login-link {
            text-align: center;
            margin-top: 14px;
            font-size: 12px;
            color: #8ab4d6;
        }
        .login-link a {
            color: #6CF;
            text-decoration: none;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .note {
            background: rgba(255, 255, 255, 0.06);
            border-left: 3px solid #4caf50;
            padding: 10px 14px;
            border-radius: 6px;
            color: #b0d4e8;
            font-size: 12px;
            margin-bottom: 16px;
        }
        .note i {
            color: #4caf50;
            margin-right: 6px;
        }
    </style>
</head>
<body>

    <div id="register-page">
        <div class="register-box">
            <h2><i class="fa fa-user-plus"></i> Super Admin</h2>
            <p class="sub">Create the first administrator account</p>

            <div class="note">
                <i class="fa fa-info-circle"></i>
                This account will have full control. Only one Super Admin can exist.
            </div>

            <div class="register-err" id="registerError"></div>

            <!-- Only Username -->
            <div class="lf-wrap">
                <i class="fa fa-user lf-icon"></i>
                <input class="lf-input" type="text" id="regUsername" placeholder="Choose a username" />
            </div>

            <!-- Only Password -->
            <div class="lf-wrap">
                <i class="fa fa-lock lf-icon"></i>
                <input class="lf-input" type="password" id="regPassword" placeholder="Password (min 6 chars)" />
            </div>

            <div class="lf-wrap">
                <i class="fa fa-check-circle lf-icon"></i>
                <input class="lf-input" type="password" id="regConfirmPassword" placeholder="Confirm password" />
            </div>

            <button class="btn-register" id="registerBtn">
                <i class="fa fa-user-plus"></i> CREATE SUPER ADMIN
            </button>

            <div class="login-link">
                Already have an account? <a href="index.html">Login</a>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        document.getElementById('registerBtn').addEventListener('click', async function() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const errorEl = document.getElementById('registerError');

            errorEl.style.display = 'none';
            errorEl.textContent = '';

            // Validate username
            if (username.length < 3) {
                errorEl.textContent = '❌ Username must be at least 3 characters.';
                errorEl.style.display = 'block';
                return;
            }

            // Validate password
            if (password.length < 6) {
                errorEl.textContent = '❌ Password must be at least 6 characters.';
                errorEl.style.display = 'block';
                return;
            }

            if (password !== confirm) {
                errorEl.textContent = '❌ Passwords do not match.';
                errorEl.style.display = 'block';
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> CREATING...';
            btn.disabled = true;

            try {
                // Check if Super Admin already exists
                const snapshot = await db.collection('users')
                    .where('role', '==', 'SUPER_ADMIN')
                    .get();

                if (!snapshot.empty) {
                    errorEl.textContent = '❌ Super Admin already exists! Please login.';
                    errorEl.style.display = 'block';
                    btn.innerHTML = '<i class="fa fa-user-plus"></i> CREATE SUPER ADMIN';
                    btn.disabled = false;
                    return;
                }

                // Generate a dummy email for Firebase Auth (user never sees this)
                const dummyEmail = username.toLowerCase().replace(/\s/g, '') + '@flexsms.local';

                // Create user with Firebase Auth
                const userCred = await auth.createUserWithEmailAndPassword(dummyEmail, password);
                const uid = userCred.user.uid;

                // Save user data in Firestore
                await db.collection('users').doc(uid).set({
                    username: username,
                    email: dummyEmail, // stored but hidden from user
                    role: 'SUPER_ADMIN',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    createdBy: null
                });

                // Store session
                localStorage.setItem('userUID', uid);
                localStorage.setItem('userRole', 'SUPER_ADMIN');
                localStorage.setItem('userName', username);

                // Redirect to dashboard
                window.location.href = 'dashboard.html';

            } catch (err) {
                console.error('Registration error:', err);
                errorEl.textContent = '❌ ' + (err.message || 'Registration failed. Try a different username.');
                errorEl.style.display = 'block';
                btn.innerHTML = '<i class="fa fa-user-plus"></i> CREATE SUPER ADMIN';
                btn.disabled = false;
            }
        });

        // Enter key support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('registerBtn').click();
            }
        });
    </script>

</body>
</html>
