<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Power SMS | Setup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="login-page">
  <div class="login-box">
    <div class="login-title">⚙️ Power SMS Setup</div>
    <p style="color:#aaa;font-size:12px;text-align:center;margin-bottom:20px;">First time setup. Create your admin account.</p>
    <div class="login-err" id="err"></div>
    <div class="lf-wrap">
      <i class="fa fa-user lf-icon"></i>
      <input class="lf-input" type="text" id="username" placeholder="Username">
    </div>
    <div class="lf-wrap">
      <i class="fa fa-lock lf-icon"></i>
      <input class="lf-input" type="password" id="pass" placeholder="Password (min 6 characters)">
    </div>
    <div class="lf-wrap">
      <i class="fa fa-lock lf-icon"></i>
      <input class="lf-input" type="password" id="pass2" placeholder="Confirm Password">
    </div>
    <button class="btn-login" id="setupBtn" onclick="doSetup()">CREATE ADMIN ACCOUNT</button>
  </div>
</div>

<script>
async function doSetup() {
  const username = document.getElementById('username').value.trim();
  const pass = document.getElementById('pass').value;
  const pass2 = document.getElementById('pass2').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('setupBtn');

  err.style.display = 'none';

  if (!username) { showErr('Username is required.'); return; }
  if (pass.length < 6) { showErr('Password must be at least 6 characters.'); return; }
  if (pass !== pass2) { showErr('Passwords do not match.'); return; }

  btn.textContent = 'Creating...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/setup/complete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password: pass })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/login';
    } else {
      showErr(data.error || 'Setup failed.');
      btn.textContent = 'CREATE ADMIN ACCOUNT';
      btn.disabled = false;
    }
  } catch (e) {
    showErr('Server error. Try again.');
    btn.textContent = 'CREATE ADMIN ACCOUNT';
    btn.disabled = false;
  }
}

function showErr(msg) {
  const err = document.getElementById('err');
  err.textContent = msg;
  err.style.display = 'block';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSetup();
});
</script>
</body>
</html>
