{% extends "base.html" %}
{% block title %}Notifications - RAZOR SMS{% endblock %}
{% block content %}

<div style="margin-bottom:16px;">
    <h4 style="margin:0; color:var(--accent);"><i class="fa fa-bell"></i> Notifications</h4>
</div>

<div style="background:var(--card); border:1px solid var(--border); border-radius:10px; padding:24px;">
    <div style="display:flex; align-items:center; gap:12px; color:var(--accent);">
        <i class="fa fa-info-circle" style="font-size:20px;"></i>
        <span style="font-size:14px;">No new notifications at this time.</span>
    </div>
</div>
{% endblock %}
