{% extends "base.html" %}
{% block title %}Add Provider - RAZOR SMS PANEL{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-12">
        <h4><i class="fa fa-plus"></i> Add Provider</h4>
    </div>
</div>

<div class="card" style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:20px;">
    <h5 style="color:var(--txt);margin-bottom:16px;">Quick Select (Built-in Panels)</h5>
    <div style="display:flex;flex-wrap:wrap;gap:8px;">
        {% for name, data in builtin_panels.items() %}
        <a href="{{ url_for('provider.add_provider') }}?builtin={{ name }}"
            style="background:var(--hover);color:var(--txt);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:13px;text-decoration:none;">
            {{ name }}
        </a>
        {% endfor %}
    </div>
</div>

<div class="card" style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;">
    <h5 style="color:var(--txt);margin-bottom:20px;">Provider Details</h5>
    <form method="POST">
        <div class="row">
            <div class="col-md-6" style="margin-bottom:16px;">
                <label style="color:var(--muted);font-size:13px;display:block;margin-bottom:6px;">Provider Name *</label>
                <input type="text" name="name" value="{{ builtin_name }}" required
                    style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:8px 12px;font-size:14px;">
            </div>
            <div class="col-md-6" style="margin-bottom:16px;">
                <label style="color:var(--muted);font-size:13px;display:block;margin-bottom:6px;">Type *</label>
                <select name="ptype" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:8px 12px;font-size:14px;">
                    <option value="ints" {% if builtin_data.get('ptype') == 'ints' %}selected{% endif %}>ints</option>
                    <option value="ims" {% if builtin_data.get('ptype') == 'ims' %}selected{% endif %}>ims</option>
                    <option value="konekta" {% if builtin_data.get('ptype') == 'konekta' %}selected{% endif %}>konekta</option>
                    <option value="standard" {% if builtin_data.get('ptype') == 'standard' %}selected{% endif %}>standard</option>
                    <option value="roxy" {% if builtin_data.get('ptype') == 'roxy' %}selected{% endif %}>roxy</option>
                    <option value="voicegate" {% if builtin_data.get('ptype') == 'voicegate' %}selected{% endif %}>voicegate</option>
                    <option value="numberpanel" {% if builtin_data.get('ptype') == 'numberpanel' %}selected{% endif %}>numberpanel</option>
                    <option value="proofsms" {% if builtin_data.get('ptype') == 'proofsms' %}selected{% endif %}>proofsms</option>
                    <option value="timesms" {% if builtin_data.get('ptype') == 'timesms' %}selected{% endif %}>timesms</option>
                </select>
            </div>
            <div class="col-md-12" style="margin-bottom:16px;">
                <label style="color:var(--muted);font-size:13px;display:block;margin-bottom:6px;">URL *</label>
                <input type="text" name="url" value="{{ builtin_data.get('url', '') }}" required
                    style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:8px 12px;font-size:14px;">
            </div>
            <div class="col-md-6" style="margin-bottom:16px;">
                <label style="color:var(--muted);font-size:13px;display:block;margin-bottom:6px;">Username *</label>
                <input type="text" name="username" required
                    style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:8px 12px;font-size:14px;">
            </div>
            <div class="col-md-6" style="margin-bottom:16px;">
                <label style="color:var(--muted);font-size:13px;display:block;margin-bottom:6px;">Password *</label>
                <input type="password" name="password" required
                    style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:8px 12px;font-size:14px;">
            </div>
            <div class="col-md-6" style="margin-bottom:16px;">
                <label style="color:var(--muted);font-size:13px;display:block;margin-bottom:6px;">Fetch Interval (seconds) *</label>
                <input type="number" name="fetch_interval" value="10" min="5" max="300" required
                    style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:8px 12px;font-size:14px;">
            </div>
        </div>
        <button type="submit" style="background:var(--accent);color:#000;border:none;border-radius:6px;padding:10px 24px;font-weight:600;cursor:pointer;">
            <i class="fa fa-plus"></i> Add Provider
        </button>
        <a href="{{ url_for('provider.providers') }}" style="background:var(--hover);color:var(--txt);border:1px solid var(--border);border-radius:6px;padding:10px 24px;font-weight:600;text-decoration:none;margin-left:8px;">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
