{% extends "base.html" %}
{% block title %}{{ 'Edit User' if user else 'Create User' }} - RAZOR SMS{% endblock %}
{% block content %}

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h4 style="margin:0; color:var(--accent);"><i class="fa fa-user"></i> {{ 'Edit User' if user else 'Create User' }}</h4>
    <a href="{{ url_for('admin.users') }}" style="background:var(--hover); color:var(--txt); border:1px solid var(--border); border-radius:6px; padding:8px 16px; font-size:13px; text-decoration:none;">
        <i class="fa fa-arrow-left"></i> Back
    </a>
</div>

<div style="background:var(--card); border:1px solid var(--border); border-radius:10px; padding:24px; max-width:700px;">
    <form method="POST" action="{{ url_for('admin.create_user') if not user else url_for('admin.edit_user', user_id=user.id) }}">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">USERNAME *</label>
                <input type="text" name="username" value="{{ user.username if user else '' }}" required {% if user %}readonly{% endif %}
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">EMAIL *</label>
                <input type="email" name="email" value="{{ user.email if user else '' }}" required
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">PASSWORD {% if not user %}*{% endif %}</label>
                <input type="password" name="password" {% if not user %}required{% endif %}
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;"
                    placeholder="{% if user %}Leave blank to keep current{% endif %}">
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">ROLE *</label>
                <select name="role_id" required style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
                    {% for role in roles %}
                    <option value="{{ role.id }}" {% if user and user.role_id == role.id %}selected{% endif %}>{{ role.display_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">AGENT</label>
                <select name="agent_id" style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
                    <option value="">None</option>
                    {% for agent in agents %}
                    <option value="{{ agent.id }}" {% if user and user.agent_id == agent.id %}selected{% endif %}>{{ agent.username }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">FULL NAME</label>
                <input type="text" name="name" value="{{ user.name if user else '' }}"
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">COMPANY</label>
                <input type="text" name="company" value="{{ user.company if user else '' }}"
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">COUNTRY</label>
                <input type="text" name="country" value="{{ user.country if user else '' }}"
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">SMS LIMIT (0 = unlimited)</label>
                <input type="number" name="sms_limit" value="{{ user.sms_limit if user else '0' }}" min="0"
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">ACTIVE</label>
                <select name="is_active" style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
                    <option value="1" {% if not user or user.is_active %}selected{% endif %}>Yes</option>
                    <option value="0" {% if user and not user.is_active %}selected{% endif %}>No</option>
                </select>
            </div>
        </div>
        <div style="display:flex; gap:10px;">
            <button type="submit" style="background:var(--accent); color:#000; border:none; border-radius:6px; padding:10px 24px; font-size:13px; font-weight:700; cursor:pointer;">
                <i class="fa fa-save"></i> Save
            </button>
            <a href="{{ url_for('admin.users') }}" style="background:var(--hover); color:var(--txt); border:1px solid var(--border); border-radius:6px; padding:10px 24px; font-size:13px; text-decoration:none;">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
