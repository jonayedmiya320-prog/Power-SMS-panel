{% extends "base.html" %}
{% block title %}Send SMS - RAZOR SMS{% endblock %}
{% block content %}

<div style="margin-bottom:20px;">
    <h4 style="margin:0; color:var(--accent);"><i class="fa fa-paper-plane"></i> Send SMS</h4>
</div>

<div style="background:var(--card); border:1px solid var(--border); border-radius:10px; padding:24px; max-width:600px;">
    <form method="POST">
        <div style="margin-bottom:16px;">
            <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">SMS NUMBER *</label>
            <select name="number" required style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
                <option value="">Select SMS Number...</option>
                {% for num in sms_numbers %}
                <option value="{{ num.number }}">{{ num.number }} ({{ num.sms_range.country if num.sms_range else 'N/A' }})</option>
                {% endfor %}
            </select>
        </div>
        <div style="margin-bottom:16px;">
            <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">CLI (SENDER ID) *</label>
            <input type="text" name="cli" required placeholder="e.g., WhatsApp, Viber, Facebook"
                style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
        </div>
        <div style="margin-bottom:20px;">
            <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">MESSAGE *</label>
            <textarea name="message" required rows="5" placeholder="Enter your SMS message here..."
                style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px; resize:vertical;"></textarea>
        </div>
        <div style="display:flex; gap:10px;">
            <button type="submit" style="background:var(--accent); color:#000; border:none; border-radius:6px; padding:10px 24px; font-size:13px; font-weight:700; cursor:pointer;">
                <i class="fa fa-paper-plane"></i> Send SMS
            </button>
            <a href="{{ url_for('admin.index') }}" style="background:var(--hover); color:var(--txt); border:1px solid var(--border); border-radius:6px; padding:10px 20px; font-size:13px; text-decoration:none;">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
