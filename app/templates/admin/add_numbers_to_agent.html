{% extends "base.html" %}
{% block title %}Add Numbers to Agent{% endblock %}

{% block content %}
<div style="margin-bottom:16px;">
    <h4 style="margin:0; color:var(--accent);"><i class="fa fa-plus-circle"></i> Add Numbers to Agent</h4>
</div>

<!-- Search + Form -->
<div style="background:var(--card); border:1px solid var(--border); border-radius:10px; padding:24px; max-width:560px;">

    <!-- Agent Search -->
    <form method="GET" style="display:flex; gap:8px; margin-bottom:20px;">
        <input type="text" name="search" value="{{ search }}" placeholder="Search agent by username..."
            style="flex:1; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:8px 12px; font-size:13px;">
        <button type="submit" style="background:var(--hover); color:var(--txt); border:1px solid var(--border); border-radius:6px; padding:8px 16px; font-size:13px; cursor:pointer;">
            <i class="fa fa-search"></i>
        </button>
    </form>

    <form method="POST">
        <div style="margin-bottom:14px;">
            <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px;">SELECT AGENT</label>
            <select name="agent_id" required style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
                <option value="">-- Select Agent --</option>
                {% for a in agents %}
                <option value="{{ a.id }}">{{ a.username }}{% if a.name %} — {{ a.name }}{% endif %}</option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-bottom:14px;">
            <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px;">SELECT RANGE</label>
            <select name="range_id" required style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
                <option value="">-- Select Range --</option>
                {% for r in ranges %}
                <option value="{{ r.id }}">{{ r.prefix }} - {{ r.country }} (Available: {{ r.get_available_count() }})</option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-bottom:20px;">
            <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px;">NUMBER COUNT</label>
            <input type="number" name="count" value="50" min="1"
                style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
        </div>

        <button type="submit" style="width:100%; background:var(--accent); color:#000; border:none; border-radius:6px; padding:11px; font-size:14px; font-weight:700; cursor:pointer;">
            <i class="fa fa-plus"></i> Add Numbers to Agent
        </button>
    </form>
</div>
{% endblock %}
