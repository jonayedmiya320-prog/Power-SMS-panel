{% extends "base.html" %}
{% block title %}Edit Provider - RAZOR SMS PANEL{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-12">
        <h4><i class="fa fa-edit"></i> Edit Provider — {{ provider.name }}</h4>
    </div>
</div>

<div class="card" style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;">
    <form method="POST">
        <div class="row">
            <div class="col-md-6" style="margin-bottom:16px;">
                <label style="color:var(--muted);font-size:13px;display:block;margin-bottom:6px;">Username</label>
                <input type="text" name="username" value="{{ provider.username }}" required
                    style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:8px 12px;font-size:14px;">
            </div>
            <div class="col-md-6" style="margin-bottom:16px;">
                <label style="color:var(--muted);font-size:13px;display:block;margin-bottom:6px;">Password</label>
                <input type="password" name="password" value="{{ provider.password }}" required
                    style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:8px 12px;font-size:14px;">
            </div>
            <div class="col-md-6" style="margin-bottom:16px;">
                <label style="color:var(--muted);font-size:13px;display:block;margin-bottom:6px;">Fetch Interval (seconds)</label>
                <input type="number" name="fetch_interval" value="{{ provider.fetch_interval }}" min="5" max="300" required
                    style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:8px 12px;font-size:14px;">
            </div>
        </div>
        <button type="submit" style="background:var(--accent);color:#000;border:none;border-radius:6px;padding:10px 24px;font-weight:600;cursor:pointer;">
            <i class="fa fa-save"></i> Save Changes
        </button>
        <a href="{{ url_for('provider.providers') }}" style="background:var(--hover);color:var(--txt);border:1px solid var(--border);border-radius:6px;padding:10px 24px;font-weight:600;text-decoration:none;margin-left:8px;">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
