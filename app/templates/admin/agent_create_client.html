{% extends "base.html" %}
{% block title %}Create New Client - RAZOR SMS{% endblock %}
{% block content %}

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h4 style="margin:0; color:var(--accent);"><i class="fa fa-user-plus"></i> Create New Client</h4>
    <a href="{{ url_for('admin.agent_clients') }}" style="background:var(--hover); color:var(--txt); border:1px solid var(--border); border-radius:6px; padding:8px 16px; font-size:13px; text-decoration:none;">
        <i class="fa fa-arrow-left"></i> Back
    </a>
</div>

<div style="background:var(--card); border:1px solid var(--border); border-radius:10px; padding:24px; max-width:700px;">
    <form method="POST">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">USERNAME *</label>
                <input type="text" name="username" required
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">EMAIL *</label>
                <input type="email" name="email" required
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">PASSWORD *</label>
                <input type="password" name="password" required
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">FULL NAME</label>
                <input type="text" name="name"
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">COMPANY</label>
                <input type="text" name="company"
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600;">COUNTRY</label>
                <input type="text" name="country"
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
        </div>
        <div style="display:flex; gap:10px;">
            <button type="submit" style="background:var(--accent); color:#000; border:none; border-radius:6px; padding:10px 24px; font-size:13px; font-weight:700; cursor:pointer;">
                <i class="fa fa-user-plus"></i> Create Client
            </button>
            <a href="{{ url_for('admin.agent_clients') }}" style="background:var(--hover); color:var(--txt); border:1px solid var(--border); border-radius:6px; padding:10px 20px; font-size:13px; text-decoration:none;">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
