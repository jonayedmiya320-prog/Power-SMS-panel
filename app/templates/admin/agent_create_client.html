{% extends "base.html" %}
{% block title %}Create New Client{% endblock %}

{% block content %}
<div style="margin-bottom:16px; display:flex; align-items:center; gap:12px;">
    <a href="{{ url_for('admin.agent_clients') }}" style="color:var(--muted); text-decoration:none; font-size:13px;">
        <i class="fa fa-arrow-left"></i> Back to Clients
    </a>
    <h4 style="margin:0; color:var(--accent);"><i class="fa fa-user-plus"></i> Create New Client</h4>
</div>

<div style="background:var(--card); border:1px solid var(--border); border-radius:10px; padding:24px; max-width:560px;">
    <form method="POST" action="{{ url_for('admin.agent_create_client') }}">

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px;">
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600; letter-spacing:1px; text-transform:uppercase;">Username *</label>
                <input type="text" name="username" required
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600; letter-spacing:1px; text-transform:uppercase;">Email *</label>
                <input type="email" name="email" required
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
        </div>

        <div style="margin-bottom:14px;">
            <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600; letter-spacing:1px; text-transform:uppercase;">Password *</label>
            <input type="password" name="password" required
                style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px;">
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600; letter-spacing:1px; text-transform:uppercase;">Full Name</label>
                <input type="text" name="name"
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600; letter-spacing:1px; text-transform:uppercase;">Company</label>
                <input type="text" name="company"
                    style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
            </div>
        </div>

        <div style="margin-bottom:20px;">
            <label style="font-size:11px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600; letter-spacing:1px; text-transform:uppercase;">Country</label>
            <input type="text" name="country"
                style="width:100%; background:var(--hover); border:1px solid var(--border); color:var(--txt); border-radius:6px; padding:9px 12px; font-size:13px;">
        </div>

        <div style="display:flex; gap:10px;">
            <button type="submit" style="background:var(--accent); color:#000; border:none; border-radius:6px; padding:10px 24px; font-size:13px; font-weight:700; cursor:pointer;">
                <i class="fa fa-user-plus"></i> Create Client
            </button>
            <a href="{{ url_for('admin.agent_clients') }}" style="background:var(--hover); color:var(--txt); border:1px solid var(--border); border-radius:6px; padding:10px 18px; font-size:13px; text-decoration:none;">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
