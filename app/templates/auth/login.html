<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAZOR SMS PANEL | Login</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .limiter {
            width: 100%;
            max-width: 900px;
            margin: 20px;
        }
        .container-login {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .wrap-login {
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-section img {
            width: 150px;
            margin-bottom: 15px;
        }
        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #e94560;
            text-align: center;
            margin-bottom: 30px;
        }
        .wrap-input {
            position: relative;
            margin-bottom: 25px;
        }
        .input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .input:focus {
            border-color: #e94560;
            outline: none;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
        }
        .symbol-input {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #e94560 0%, #c23152 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }
        .captcha-box {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 25px;
        }
        .captcha-question {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }
        .captcha-input {
            width: 120px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }
        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .alert-danger {
            background: #ffe0e6;
            color: #c23152;
            border: 1px solid #f5c6cb;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        @media (max-width: 768px) {
            .wrap-login {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="limiter">
        <div class="container-login">
            <div class="wrap-login">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <div class="logo-section">
                    <img src="/static/img/abyss-logo.png" alt="ABYSS SMS" onerror="this.style.display='none'">
                    <h2 style="color: #333;">ABYSS SMS</h2>
                </div>

                <h1 class="login-title">Welcome to ABYSS</h1>

                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="wrap-input">
                        <span class="symbol-input">
                            <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M0 8a4 4 0 0 1 7.465-2H14a.5.5 0 0 1 .354.146l1.5 1.5a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0L13 9.207l-.646.647a.5.5 0 0 1-.708 0L11 9.207l-.646.647a.5.5 0 0 1-.708 0L9 9.207l-.646.647a.5.5 0 0 1-.708 0L7 9.207l-.646.647A.5.5 0 0 1 0 9.465V2a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8z"/>
                            </svg>
                        </span>
                        <input class="input" type="text" name="username" placeholder="Username" required autofocus>
                    </div>

                    <div class="wrap-input">
                        <span class="symbol-input">
                            <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
                            </svg>
                        </span>
                        <input class="input" type="password" name="password" placeholder="Password" required>
                    </div>

                    <div class="captcha-box">
                        <div class="captcha-question">
                            What is {{ session.get('captcha_num1', 0) }} + {{ session.get('captcha_num2', 0) }} = ?
                        </div>
                        <input type="number" name="capt" class="captcha-input" placeholder="Answer" required>
                    </div>

                    <button type="submit" class="login-btn">Login</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
